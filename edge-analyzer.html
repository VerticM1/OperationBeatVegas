<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Edge Analyzer — Prop Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f12;--bg2:#13161b;--bg3:#1a1e25;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e2e4e9;--muted:#6b7280;
  --green:#22d3a0;--red:#f4645f;--amber:#f59e0b;--blue:#60a5fa;
  --accent:#22d3a0;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding:2rem 1rem 4rem}
.shell{max-width:680px;margin:0 auto}

.header{display:flex;align-items:baseline;gap:10px;margin-bottom:1.5rem;border-bottom:0.5px solid var(--border);padding-bottom:1rem}
.header-title{font-family:var(--mono);font-size:14px;font-weight:600;letter-spacing:0.08em;color:var(--accent);text-transform:uppercase}
.header-sub{font-size:12px;color:var(--muted);font-family:var(--mono)}

.api-bar{background:var(--bg2);border:0.5px solid var(--border2);border-radius:8px;padding:12px 14px;margin-bottom:1.5rem;display:flex;align-items:center;gap:10px}
.api-bar label{font-size:11px;font-family:var(--mono);color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;white-space:nowrap;margin:0}
.api-bar input{flex:1;background:transparent;border:none;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;letter-spacing:0.03em}
.api-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background 0.2s}
.api-dot.ok{background:var(--green)}

.section{margin-bottom:1.25rem}
.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
label{display:block;font-size:11px;font-family:var(--mono);color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:5px}
input[type=text],input[type=number],select,textarea{
  width:100%;background:var(--bg2);border:0.5px solid var(--border2);border-radius:6px;
  color:var(--text);font-family:var(--sans);font-size:14px;padding:9px 11px;outline:none;transition:border-color 0.15s
}
input[type=text]:focus,input[type=number]:focus,select:focus,textarea:focus{border-color:var(--accent)}
select option{background:#1a1e25}
textarea{resize:vertical;min-height:100px;font-family:var(--mono);font-size:12px;line-height:1.6}

.game-count-label{font-size:11px;font-family:var(--mono);color:var(--muted);margin-bottom:6px;letter-spacing:0.05em}
.game-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:6px}
.game-cell{background:var(--bg2);border:0.5px solid var(--border2);border-radius:5px;padding:6px 4px;text-align:center}
.game-cell label{font-size:10px;color:var(--muted);margin-bottom:3px;text-transform:none;letter-spacing:0}
.game-cell input{background:transparent;border:none;text-align:center;font-family:var(--mono);font-size:15px;font-weight:500;padding:2px 0;color:var(--text);width:100%}
.game-cell input:focus{border:none;outline:none}

.context-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.context-label-text{font-size:11px;font-family:var(--mono);color:var(--muted);letter-spacing:0.06em;text-transform:uppercase}
.scout-btn{
  display:flex;align-items:center;gap:6px;background:transparent;
  border:0.5px solid var(--border2);border-radius:5px;color:var(--blue);
  font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:0.05em;
  padding:4px 10px;cursor:pointer;transition:border-color 0.15s;text-transform:uppercase
}
.scout-btn:hover{border-color:var(--blue)}
.scout-btn:disabled{opacity:0.35;cursor:not-allowed}
.context-sourced{border-color:rgba(96,165,250,0.4)!important}

.scout-status{font-size:11px;font-family:var(--mono);color:var(--muted);margin-top:5px;min-height:16px;display:flex;align-items:center;gap:6px}
.scout-dot{width:5px;height:5px;border-radius:50%;background:var(--blue);animation:blink 1s ease-in-out infinite;display:none}
.scout-dot.show{display:inline-block}

.source-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.source-tag{font-size:10px;font-family:var(--mono);background:rgba(96,165,250,0.08);color:var(--blue);border:0.5px solid rgba(96,165,250,0.2);border-radius:4px;padding:2px 7px}

.analyze-btn{
  width:100%;background:var(--accent);color:#0d0f12;border:none;border-radius:6px;
  font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:0.08em;
  text-transform:uppercase;padding:13px;cursor:pointer;transition:opacity 0.15s,transform 0.1s;margin-top:0.25rem
}
.analyze-btn:hover{opacity:0.88}
.analyze-btn:active{transform:scale(0.99)}
.analyze-btn:disabled{opacity:0.35;cursor:not-allowed}

.loading-row{display:none;align-items:center;gap:6px;font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:1rem;justify-content:center}
.loading-row.show{display:flex}
.dot-p{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:blink 1.2s ease-in-out infinite}
.dot-p:nth-child(2){animation-delay:0.2s}
.dot-p:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,80%,100%{opacity:0.2;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}

.error-box{display:none;background:rgba(244,100,95,0.07);border:0.5px solid rgba(244,100,95,0.25);border-radius:6px;padding:10px 14px;font-size:13px;color:var(--red);margin-top:1rem;font-family:var(--mono);line-height:1.5}
.error-box.show{display:block}

.result-panel{display:none;margin-top:1.5rem;border:0.5px solid var(--border2);border-radius:10px;overflow:hidden}
.result-panel.visible{display:block}
.result-header{background:var(--bg3);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid var(--border)}
.result-label{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.07em;text-transform:uppercase}
.conf-badge{font-family:var(--mono);font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;letter-spacing:0.05em}
.conf-high{background:rgba(34,211,160,0.12);color:var(--green)}
.conf-med{background:rgba(245,158,11,0.12);color:var(--amber)}
.conf-low{background:rgba(244,100,95,0.12);color:var(--red)}
.result-body{padding:16px}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.stat-box{background:var(--bg3);border-radius:6px;padding:10px 12px;border:0.5px solid var(--border)}
.stat-box-label{font-size:10px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px}
.stat-box-val{font-family:var(--mono);font-size:18px;font-weight:500}

.edge-wrap{margin-bottom:1.25rem}
.edge-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:6px}
.edge-track{height:8px;background:var(--bg3);border-radius:4px;position:relative;overflow:hidden}
.edge-fill{height:100%;border-radius:4px;position:absolute;transition:width 0.8s cubic-bezier(.4,0,.2,1),left 0.8s cubic-bezier(.4,0,.2,1)}
.edge-mid{position:absolute;left:50%;top:-2px;width:1px;height:12px;background:var(--border2);z-index:1}
.edge-score-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.edge-num{font-family:var(--mono);font-size:28px;font-weight:600;line-height:1}
.dir-badge{font-family:var(--mono);font-size:18px;font-weight:600;padding:5px 16px;border-radius:6px;letter-spacing:0.05em}
.dir-over{background:rgba(34,211,160,0.1);color:var(--green);border:0.5px solid rgba(34,211,160,0.25)}
.dir-under{background:rgba(244,100,95,0.1);color:var(--red);border:0.5px solid rgba(244,100,95,0.25)}
.dir-none{background:rgba(107,114,128,0.1);color:var(--muted);border:0.5px solid var(--border2)}

.divider{height:0.5px;background:var(--border);margin:1rem 0}
.section-label{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:10px}
.factor-item{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;font-size:13px;line-height:1.5}
.f-dot{width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0}
.f-bull{background:var(--green)}
.f-bear{background:var(--red)}
.f-neut{background:var(--muted)}
.verdict-box{background:var(--bg3);border-radius:6px;padding:12px 14px;border:0.5px solid var(--border);font-size:13px;line-height:1.6;color:var(--text)}
</style>
</head>
<body>
<div class="shell">

  <div class="header">
    <span class="header-title">Edge Analyzer</span>
    <span class="header-sub">// prop intelligence system</span>
  </div>

  <div class="api-bar">
    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." oninput="checkKey()"/>
    <div class="api-dot" id="apiDot"></div>
  </div>

  <div class="section row-3">
    <div>
      <label>Player name</label>
      <input type="text" id="player" placeholder="LeBron James" value="LeBron James"/>
    </div>
    <div>
      <label>Stat type</label>
      <select id="stat">
        <option>Points</option>
        <option>Rebounds</option>
        <option>Assists</option>
        <option>3-Pointers Made</option>
        <option>Points + Rebounds</option>
        <option>Points + Assists</option>
        <option>Points + Rebounds + Assists</option>
        <option>Steals</option>
        <option>Blocks</option>
      </select>
    </div>
    <div>
      <label>Prop line</label>
      <input type="number" id="line" placeholder="22.5" step="0.5" value="22.5"/>
    </div>
  </div>

  <div class="section">
    <div class="game-count-label">Last 7 games — enter stat values (leave blank if DNP)</div>
    <div class="game-grid">
      <div class="game-cell"><label>G1 newest</label><input type="number" id="g1" placeholder="—" step="0.5" value="22"/></div>
      <div class="game-cell"><label>G2</label><input type="number" id="g2" placeholder="—" step="0.5" value="18"/></div>
      <div class="game-cell"><label>G3</label><input type="number" id="g3" placeholder="—" step="0.5"/></div>
      <div class="game-cell"><label>G4</label><input type="number" id="g4" placeholder="—" step="0.5"/></div>
      <div class="game-cell"><label>G5</label><input type="number" id="g5" placeholder="—" step="0.5"/></div>
    </div>
    <div class="game-grid" style="margin-top:6px">
      <div class="game-cell"><label>G6</label><input type="number" id="g6" placeholder="—" step="0.5"/></div>
      <div class="game-cell"><label>G7</label><input type="number" id="g7" placeholder="—" step="0.5"/></div>
      <div class="game-cell" style="grid-column:span 3;display:flex;align-items:center;justify-content:center;background:transparent;border:none">
        <span style="font-size:11px;color:var(--muted);font-family:var(--mono)">DNPs excluded from avg</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="context-header">
      <span class="context-label-text">Context</span>
      <button class="scout-btn" id="scoutBtn" onclick="runScout()">⌕ Auto-scout</button>
    </div>
    <textarea id="context" placeholder="Auto-scout will search for matchup data, injury news, pace, usage trends — or type your own intel here."></textarea>
    <div class="scout-status" id="scoutStatus">
      <div class="scout-dot" id="scoutDot"></div>
      <span id="scoutText"></span>
    </div>
    <div class="source-tags" id="sourceTags"></div>
  </div>

  <button class="analyze-btn" id="analyzeBtn" onclick="runAnalysis()">⟶ &nbsp;Analyze edge</button>

  <div class="loading-row" id="loadingRow">
    <div class="dot-p"></div><div class="dot-p"></div><div class="dot-p"></div>
    <span style="margin-left:6px">Running edge model...</span>
  </div>
  <div class="error-box" id="errorBox"></div>

  <div class="result-panel" id="resultPanel">
    <div class="result-header">
      <span class="result-label" id="resultTitle">Analysis</span>
      <span class="conf-badge" id="confBadge">—</span>
    </div>
    <div class="result-body">
      <div class="stat-row">
        <div class="stat-box"><div class="stat-box-label">Recent avg</div><div class="stat-box-val" id="recentAvg">—</div></div>
        <div class="stat-box"><div class="stat-box-label">Prop line</div><div class="stat-box-val" id="lineDisplay">—</div></div>
        <div class="stat-box"><div class="stat-box-label">Hit rate</div><div class="stat-box-val" id="hitRate">—</div></div>
      </div>
      <div class="edge-wrap">
        <div class="edge-labels"><span>◀ strong under</span><span>no edge</span><span>strong over ▶</span></div>
        <div class="edge-track">
          <div class="edge-mid"></div>
          <div class="edge-fill" id="edgeFill"></div>
        </div>
        <div class="edge-score-row">
          <div>
            <div style="font-size:11px;font-family:var(--mono);color:var(--muted);margin-bottom:2px">EDGE SCORE</div>
            <div class="edge-num" id="edgeNum">—</div>
          </div>
          <div class="dir-badge" id="dirBadge">—</div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section-label">Key factors</div>
      <div id="factorsList"></div>
      <div class="divider"></div>
      <div class="section-label">Model verdict</div>
      <div class="verdict-box" id="verdictBox"></div>
    </div>
  </div>

</div>
<script>
function getKey(){ return document.getElementById('apiKey').value.trim(); }

function checkKey(){
  const k = getKey();
  document.getElementById('apiDot').className = 'api-dot' + (k.startsWith('sk-ant-') ? ' ok' : '');
}

function headers(){
  return {
    'Content-Type':'application/json',
    'x-api-key': getKey(),
    'anthropic-version':'2023-06-01',
    'anthropic-dangerous-direct-browser-access':'true'
  };
}

async function callClaude(body){
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST', headers:headers(),
    body:JSON.stringify(body)
  });
  if(!res.ok){
    const t = await res.text();
    throw new Error(`API ${res.status}: ${t}`);
  }
  return res.json();
}

function parseJSON(raw){
  raw = raw.replace(/```json|```/g,'').trim();
  const m = raw.match(/\{[\s\S]*\}/);
  return JSON.parse(m ? m[0] : raw);
}

async function runScout(){
  if(!getKey()){ setScout('Enter your API key first.',false); return; }
  const player = document.getElementById('player').value.trim();
  const stat = document.getElementById('stat').value;
  if(!player){ setScout('Enter a player name first.',false); return; }

  document.getElementById('scoutBtn').disabled = true;
  document.getElementById('sourceTags').innerHTML = '';
  setScout('Scouting matchup, injuries, trends...', true);

  const prompt = `You are a sharp NBA betting researcher. Search for and summarize current intelligence about ${player} relevant to their upcoming game's ${stat} prop bet.

Return ONLY valid JSON, no markdown:
{
  "context_summary": "<2-4 sentence dense summary: opponent defensive rating vs position, pace, injury/rest status, usage trends, role changes, home/away, back-to-back, lineup news — include specific numbers where found>",
  "sources_found": ["<source 1>","<source 2>","<source 3>"]
}

Search for: injury report for ${player}, ${player} usage rate and role this season, upcoming opponent defensive stats vs ${player}'s position, game pace, load management news, recent Lakers lineup changes. Do not invent statistics.`;

  try{
    const data = await callClaude({
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      tools:[{type:'web_search_20250305',name:'web_search'}],
      messages:[{role:'user',content:prompt}]
    });
    let raw = '';
    for(const b of data.content||[]){ if(b.type==='text') raw += b.text; }
    const parsed = parseJSON(raw);
    const existing = document.getElementById('context').value.trim();
    const newCtx = parsed.context_summary || '';
    document.getElementById('context').value = existing ? existing+'\n\n[Auto-scouted]\n'+newCtx : newCtx;
    document.getElementById('context').classList.add('context-sourced');
    const tagsEl = document.getElementById('sourceTags');
    (parsed.sources_found||[]).forEach(s=>{
      const t = document.createElement('span');
      t.className='source-tag'; t.textContent=s; tagsEl.appendChild(t);
    });
    setScout('Scout complete — edit or add your own intel below.',false,true);
  }catch(e){
    setScout('Scout failed: '+e.message,false);
    console.error(e);
  }finally{
    document.getElementById('scoutBtn').disabled=false;
  }
}

async function runAnalysis(){
  if(!getKey()){ showError('Paste your Anthropic API key at the top.'); return; }
  const player = document.getElementById('player').value.trim();
  const stat = document.getElementById('stat').value;
  const line = parseFloat(document.getElementById('line').value);
  const ctx = document.getElementById('context').value.trim();

  if(!player||isNaN(line)){ showError('Fill in player name and prop line.'); return; }

  const games = ['g1','g2','g3','g4','g5','g6','g7']
    .map(id=>document.getElementById(id).value)
    .filter(v=>v!==''&&v!==null&&v!==undefined)
    .map(Number).filter(n=>!isNaN(n));

  if(games.length<2){ showError('Enter at least 2 recent game values.'); return; }

  const avg = games.reduce((a,b)=>a+b,0)/games.length;
  const hitRate = Math.round(games.filter(v=>v>line).length/games.length*100);

  document.getElementById('recentAvg').textContent = avg.toFixed(1);
  document.getElementById('lineDisplay').textContent = line;
  document.getElementById('hitRate').textContent = hitRate+'%';

  setLoading(true); clearError(); hideResult();

  const prompt = `You are a sharp sports betting analyst. Analyze this NBA player prop and return ONLY valid JSON, no markdown, no preamble.

Player: ${player}
Stat: ${stat}
Prop line: ${line}
Recent games (newest first): ${games.join(', ')}
Recent average: ${avg.toFixed(2)}
Hit rate vs line: ${hitRate}%
Context/intel: ${ctx||'None provided'}

Return exactly:
{
  "edge_score": <integer -100 to 100, negative=under edge, positive=over edge>,
  "direction": <"OVER" or "UNDER" or "NO EDGE">,
  "confidence": <"HIGH" or "MEDIUM" or "LOW">,
  "factors": [
    {"text":"<factor>","type":<"bull" or "bear" or "neutral">},
    {"text":"<factor>","type":<"bull" or "bear" or "neutral">},
    {"text":"<factor>","type":<"bull" or "bear" or "neutral">},
    {"text":"<factor>","type":<"bull" or "bear" or "neutral">}
  ],
  "verdict":"<2-3 sentence verdict: is edge real, how much to trust it, what would change the call>"
}

Be rigorous. Weight scouted context heavily. Consider: recent form vs line, hit rate, sample size, regression risk, matchup, pace, role. Be honest if edge is weak.`;

  try{
    const data = await callClaude({
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      messages:[{role:'user',content:prompt}]
    });
    const raw = data.content?.[0]?.text||'';
    renderResult(parseJSON(raw), player, stat, line);
  }catch(e){
    showError('Analysis failed: '+e.message);
    console.error(e);
  }finally{ setLoading(false); }
}

function renderResult(d, player, stat, line){
  document.getElementById('resultTitle').textContent = `${player} — ${stat} ${line}`;
  const badge = document.getElementById('confBadge');
  badge.textContent = d.confidence;
  badge.className = 'conf-badge '+({'HIGH':'conf-high','MEDIUM':'conf-med','LOW':'conf-low'}[d.confidence]||'conf-low');

  const score = Math.max(-100,Math.min(100,parseInt(d.edge_score)||0));
  const fill = document.getElementById('edgeFill');
  fill.style.transition='none'; fill.style.width='0%'; fill.style.left='50%';
  setTimeout(()=>{
    fill.style.transition='width 0.8s cubic-bezier(.4,0,.2,1), left 0.8s cubic-bezier(.4,0,.2,1)';
    if(score>0){ fill.style.background='var(--green)'; fill.style.left='50%'; fill.style.width=(score/2)+'%'; }
    else if(score<0){ const p=Math.abs(score)/2; fill.style.background='var(--red)'; fill.style.left=(50-p)+'%'; fill.style.width=p+'%'; }
    else{ fill.style.background='var(--muted)'; fill.style.left='49.5%'; fill.style.width='1%'; }
  },80);

  const numEl = document.getElementById('edgeNum');
  numEl.textContent = (score>0?'+':'')+score;
  numEl.style.color = score>0?'var(--green)':score<0?'var(--red)':'var(--muted)';

  const dirEl = document.getElementById('dirBadge');
  dirEl.textContent = d.direction;
  dirEl.className = 'dir-badge '+({'OVER':'dir-over','UNDER':'dir-under','NO EDGE':'dir-none'}[d.direction]||'dir-none');

  document.getElementById('factorsList').innerHTML = (d.factors||[]).map(f=>
    `<div class="factor-item">
      <div class="f-dot ${({'bull':'f-bull','bear':'f-bear','neutral':'f-neut'}[f.type]||'f-neut')}"></div>
      <span>${f.text}</span>
    </div>`
  ).join('');

  document.getElementById('verdictBox').textContent = d.verdict;
  document.getElementById('resultPanel').classList.add('visible');
  document.getElementById('resultPanel').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function setScout(msg,loading,success){
  document.getElementById('scoutText').textContent=msg;
  document.getElementById('scoutDot').classList.toggle('show',loading);
  document.getElementById('scoutText').style.color=success?'var(--green)':loading?'var(--blue)':'var(--muted)';
}
function setLoading(v){ document.getElementById('loadingRow').classList.toggle('show',v); document.getElementById('analyzeBtn').disabled=v; }
function showError(m){ const e=document.getElementById('errorBox'); e.textContent=m; e.classList.add('show'); }
function clearError(){ document.getElementById('errorBox').classList.remove('show'); }
function hideResult(){ document.getElementById('resultPanel').classList.remove('visible'); }
</script>
</body>
</html>
